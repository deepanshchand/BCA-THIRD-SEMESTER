<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Events Practice</title>

    <style>
      .parent {
        padding: 40px;
        background-color: lightblue;
      }

      .child {
        padding: 40px;
        background-color: lightgreen;
      }

      .grandchild {
        padding: 40px;
        background-color: lightcoral;
      }

      ul {
        cursor: pointer;
      }

      li {
        margin: 8px;
      }
    </style>
  </head>
  <body>
    <h1 id="heading">JavaScript Events</h1>

    <button id="btn">Click Me</button>

    <br /><br />

    <input type="text" id="username" placeholder="Enter Name" />

    <br /><br />

    <div class="parent">
      Parent

      <div class="child">
        Child

        <div class="grandchild">Grand Child</div>
      </div>
    </div>

    <br /><br />

    <ul id="list">
      <li>HTML</li>
      <li>CSS</li>
      <li>JavaScript</li>
    </ul>

    <script src="15_Events.js"></script>

</html>
